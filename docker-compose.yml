

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runtime
    container_name: instant-ai-gate-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:49152:80"
    volumes:
      - ./storage/models:/app/storage/models
    environment:
      - ApiKeyOptions__AdminKey=skip
      - Storage__RootPath=/app/storage/models
      - CorsSettings__AllowedOrigins__0=http://localhost:49153
      - CorsSettings__AllowedOrigins__1=http://127.0.0.1:49153
      - Logging__LogLevel__Default=Warning
      - ASPNETCORE_URLS=http://+:80
      - ASPNETCORE_ENVIRONMENT=Production
      - NVIDIA_VISIBLE_DEVICES=all
    networks:
      - app-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility]

  admin:
    build:
      context: .
      dockerfile: Dockerfile
      target: admin-runtime
    container_name: instant-ai-gate-admin
    restart: unless-stopped
    ports:
      - "127.0.0.1:49153:80"
    depends_on:
      - api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - Logging__LogLevel__Default=Warning
      - APIClientOptions__BaseUrl=http://api:80
      - APIClientOptions__PublicUrl=http://127.0.0.1:49152
      - APIClientOptions__AdminApiKey=skip
    networks:
      - app-network

networks:
  app-network: 
    driver: bridge